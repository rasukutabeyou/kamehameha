<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beam Live</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090b0f;
        color: #8fd3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: #111721;
        border-bottom: 1px solid #263142;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .stats {
        display: flex;
        gap: 14px;
        align-items: center;
        color: #7fc7ff;
        font-size: 13px;
        white-space: nowrap;
      }

      .hp {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .hpbar {
        width: 128px;
        height: 12px;
        border: 1px solid #6d7888;
        background: #2b313b;
      }

      .hpfill {
        height: 100%;
        width: 100%;
        background: #46d2ff;
      }

      .hpfill.p2 {
        background: #f56ee6;
      }

      .hpfill.energy {
        background: #58e678;
      }

      button,
      select {
        height: 30px;
        padding: 0 12px;
        border: 1px solid #465569;
        background: #1b2432;
        color: #8fd3ff;
        border-radius: 6px;
      }

      button {
        cursor: pointer;
      }

      button:hover,
      select:hover {
        background: #263348;
      }

      .control {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .control span {
        color: #62b8f5;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #e05c5c;
        box-shadow: 0 0 12px #e05c5c;
      }

      .dot.online {
        background: #3ee68f;
        box-shadow: 0 0 14px #3ee68f;
      }

      main {
        min-height: 0;
        display: grid;
        place-items: center;
        position: relative;
        background:
          radial-gradient(circle at center, rgba(41, 111, 153, 0.14), transparent 44%),
          #080a0d;
      }

      .debug-panel {
        position: absolute;
        right: 14px;
        bottom: 14px;
        width: min(420px, calc(100vw - 28px));
        max-height: min(460px, calc(100vh - 96px));
        overflow: auto;
        border: 1px solid #3b495c;
        background: rgba(10, 14, 20, 0.84);
        color: #9bd8ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        padding: 10px 12px;
        display: none;
      }

      .debug-panel.visible {
        display: block;
      }

      .debug-player + .debug-player {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #2a3545;
      }

      .debug-title {
        color: #8fd3ff;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .debug-grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 2px 10px;
      }

      .debug-key {
        color: #5fb2ef;
      }

      img {
        width: min(100vw, 1600px);
        height: calc(100vh - 54px);
        object-fit: contain;
        display: block;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
          height: 78px;
          padding: 10px 12px;
          gap: 6px;
        }

        img {
          height: calc(100vh - 78px);
        }

        .stats {
          width: 100%;
          overflow-x: auto;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Beam Live</h1>
      <div class="stats">
        <span class="dot" id="dot"></span>
        <span id="camera">camera: offline</span>
        <span id="frames">frames: 0</span>
        <span id="latency">processing: 0 ms</span>
        <span class="hp">P1 <span class="hpbar"><span class="hpfill" id="p1hp"></span></span> <span id="p1text">100</span></span>
        <span class="hp">P2 <span class="hpbar"><span class="hpfill p2" id="p2hp"></span></span> <span id="p2text">100</span></span>
        <span class="hp">P1 ENERGY <span class="hpbar"><span class="hpfill energy" id="p1energy"></span></span> <span id="p1energytext">50</span></span>
        <span class="hp">P2 ENERGY <span class="hpbar"><span class="hpfill energy" id="p2energy"></span></span> <span id="p2energytext">50</span></span>
        <label class="control"><span>NPC</span><select id="npcDifficulty"><option value="easy">Easy</option><option value="normal">Normal</option><option value="hard">Hard</option></select></label>
        <button id="battleStart" type="button">Battle Start</button>
        <span id="battleState">battle: ready</span>
        <label class="control"><span>Debug</span><select id="debugMode"><option value="off">Off</option><option value="basic">Basic</option><option value="full">Full</option></select></label>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>
    <main>
      <img src="/video.mjpg" alt="processed live camera stream" />
      <aside class="debug-panel" id="debugPanel"></aside>
    </main>
    <script>
      const dot = document.getElementById("dot");
      const camera = document.getElementById("camera");
      const frames = document.getElementById("frames");
      const latency = document.getElementById("latency");
      const p1hp = document.getElementById("p1hp");
      const p2hp = document.getElementById("p2hp");
      const p1text = document.getElementById("p1text");
      const p2text = document.getElementById("p2text");
      const p1energy = document.getElementById("p1energy");
      const p2energy = document.getElementById("p2energy");
      const p1energytext = document.getElementById("p1energytext");
      const p2energytext = document.getElementById("p2energytext");
      const reset = document.getElementById("reset");
      const battleStart = document.getElementById("battleStart");
      const battleState = document.getElementById("battleState");
      const npcDifficulty = document.getElementById("npcDifficulty");
      const debugMode = document.getElementById("debugMode");
      const debugPanel = document.getElementById("debugPanel");

      async function refreshStatus() {
        try {
          const res = await fetch("/status", { cache: "no-store" });
          const data = await res.json();
          dot.classList.toggle("online", Boolean(data.camera_online));
          camera.textContent = `camera: ${data.camera_online ? "online" : "offline"}`;
          frames.textContent = `frames: ${data.frames_out}`;
          latency.textContent = `processing: ${data.processing_ms} ms`;
          debugMode.value = data.debug_mode || "off";
          const npc = data.npc || { enabled: false, difficulty: "easy" };
          const battle = data.battle || { enabled: false, active: true, requested: false, starts_in: 0 };
          if (document.activeElement !== npcDifficulty) {
            npcDifficulty.value = npc.difficulty || "easy";
          }
          npcDifficulty.disabled = !npc.enabled || Boolean(battle.requested) || Boolean(battle.active);
          battleStart.disabled = !npc.enabled || Boolean(battle.requested) || Boolean(battle.active);
          if (!npc.enabled) {
            battleState.textContent = "battle: 2P mode";
          } else if (battle.active) {
            battleState.textContent = `battle: active (${npc.difficulty})`;
          } else if (battle.requested) {
            battleState.textContent = `battle: ${Number(battle.starts_in || 0).toFixed(1)}s`;
          } else {
            battleState.textContent = `battle: waiting (${npc.difficulty})`;
          }
          renderDebug(data.debug_mode || "off", data.debug || []);
          const game = data.game || { hp: [100, 100], max_hp: 100 };
          const hp = game.hp || [100, 100];
          const maxHp = game.max_hp || 100;
          p1hp.style.width = `${Math.max(0, Math.min(100, (hp[0] || 0) / maxHp * 100))}%`;
          p2hp.style.width = `${Math.max(0, Math.min(100, (hp[1] || 0) / maxHp * 100))}%`;
          const ultra = game.ultra || [false, false];
          p1text.textContent = `${hp[0] ?? 0}${ultra[0] ? " ULTRA" : ""}`;
          p2text.textContent = `${hp[1] ?? 0}${ultra[1] ? " ULTRA" : ""}`;
          const energy = game.energy || [50, 50];
          const maxEnergy = game.max_energy || 100;
          p1energy.style.width = `${Math.max(0, Math.min(100, (energy[0] || 0) / maxEnergy * 100))}%`;
          p2energy.style.width = `${Math.max(0, Math.min(100, (energy[1] || 0) / maxEnergy * 100))}%`;
          p1energytext.textContent = Math.round(energy[0] ?? 0);
          p2energytext.textContent = Math.round(energy[1] ?? 0);
        } catch {
          dot.classList.remove("online");
          camera.textContent = "camera: offline";
        }
      }

      function fmt(value) {
        if (Array.isArray(value)) return value.join(", ");
        if (value && typeof value === "object") return JSON.stringify(value);
        if (value === undefined || value === null || value === "") return "-";
        return String(value);
      }

      function metricRows(state, mode) {
        const d = state.debug || {};
        const rows = [
          ["detected", state.detected],
          ["active", state.active],
          ["charging", state.charging],
          ["pose_ms", d.pose_ms],
          ["missing", d.missing && d.missing.length ? d.missing.join(",") : "-"],
          ["extension", d.extension],
          ["wrist_gap_ratio", d.wrist_gap_ratio],
          ["active_smooth", d.active_smooth],
          ["charge_frames", d.charge_frames],
          ["hands_together", d.hands_together],
          ["wrists_at_chest_height", d.wrists_at_chest_height],
          ["firing_gesture", d.firing_gesture],
          ["active_raw", d.active_raw],
        ];
        if (mode === "full") {
          rows.push(
            ["shoulder_width", d.shoulder_width],
            ["reach", d.reach],
            ["elbows_forward", d.elbows_forward],
            ["left_guard", d.left_guard],
            ["right_guard", d.right_guard],
            ["powering", state.powering],
            ["transforming", state.transforming],
            ["guarding", state.guarding],
            ["visibility", d.visibility],
            ["roi", d.roi],
          );
        }
        return rows;
      }

      function renderDebug(mode, states) {
        debugPanel.classList.toggle("visible", mode !== "off");
        if (mode === "off") {
          debugPanel.replaceChildren();
          return;
        }
        const parts = states.map((state) => {
          const rows = metricRows(state, mode)
            .map(([key, value]) => `<span class="debug-key">${key}</span><span>${fmt(value)}</span>`)
            .join("");
          return `<div class="debug-player"><div class="debug-title">P${(state.player_id ?? 0) + 1}</div><div class="debug-grid">${rows}</div></div>`;
        });
        debugPanel.innerHTML = parts.length ? parts.join("") : '<div class="debug-title">waiting for debug data</div>';
      }

      debugMode.addEventListener("change", async () => {
        const mode = debugMode.value;
        await fetch("/debug", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mode }),
        });
        await refreshStatus();
      });

      npcDifficulty.addEventListener("change", async () => {
        await fetch("/npc/difficulty", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ difficulty: npcDifficulty.value }),
        });
        await refreshStatus();
      });

      battleStart.addEventListener("click", async () => {
        await fetch("/battle/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ difficulty: npcDifficulty.value }),
        });
        await refreshStatus();
      });

      reset.addEventListener("click", async () => {
        await fetch("/reset", { method: "POST" });
        await refreshStatus();
      });

      refreshStatus();
      setInterval(refreshStatus, 1000);
    </script>
  </body>
</html>
