<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kamehameha Live</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090b0f;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: #111721;
        border-bottom: 1px solid #263142;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .stats {
        display: flex;
        gap: 14px;
        align-items: center;
        color: #c8d2e0;
        font-size: 13px;
        white-space: nowrap;
      }

      .hp {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .hpbar {
        width: 128px;
        height: 12px;
        border: 1px solid #6d7888;
        background: #2b313b;
      }

      .hpfill {
        height: 100%;
        width: 100%;
        background: #46d2ff;
      }

      .hpfill.p2 {
        background: #f56ee6;
      }

      button {
        height: 30px;
        padding: 0 12px;
        border: 1px solid #465569;
        background: #1b2432;
        color: #f5f7fb;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #263348;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #e05c5c;
        box-shadow: 0 0 12px #e05c5c;
      }

      .dot.online {
        background: #3ee68f;
        box-shadow: 0 0 14px #3ee68f;
      }

      main {
        min-height: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, rgba(41, 111, 153, 0.14), transparent 44%),
          #080a0d;
      }

      img {
        width: min(100vw, 1600px);
        height: calc(100vh - 54px);
        object-fit: contain;
        display: block;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
          height: 78px;
          padding: 10px 12px;
          gap: 6px;
        }

        img {
          height: calc(100vh - 78px);
        }

        .stats {
          width: 100%;
          overflow-x: auto;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Kamehameha Live</h1>
      <div class="stats">
        <span class="dot" id="dot"></span>
        <span id="camera">camera: offline</span>
        <span id="frames">frames: 0</span>
        <span id="latency">processing: 0 ms</span>
        <span class="hp">P1 <span class="hpbar"><span class="hpfill" id="p1hp"></span></span> <span id="p1text">100</span></span>
        <span class="hp">P2 <span class="hpbar"><span class="hpfill p2" id="p2hp"></span></span> <span id="p2text">100</span></span>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>
    <main>
      <img src="/video.mjpg" alt="processed live camera stream" />
    </main>
    <script>
      const dot = document.getElementById("dot");
      const camera = document.getElementById("camera");
      const frames = document.getElementById("frames");
      const latency = document.getElementById("latency");
      const p1hp = document.getElementById("p1hp");
      const p2hp = document.getElementById("p2hp");
      const p1text = document.getElementById("p1text");
      const p2text = document.getElementById("p2text");
      const reset = document.getElementById("reset");

      async function refreshStatus() {
        try {
          const res = await fetch("/status", { cache: "no-store" });
          const data = await res.json();
          dot.classList.toggle("online", Boolean(data.camera_online));
          camera.textContent = `camera: ${data.camera_online ? "online" : "offline"}`;
          frames.textContent = `frames: ${data.frames_out}`;
          latency.textContent = `processing: ${data.processing_ms} ms`;
          const game = data.game || { hp: [100, 100], max_hp: 100 };
          const hp = game.hp || [100, 100];
          const maxHp = game.max_hp || 100;
          p1hp.style.width = `${Math.max(0, Math.min(100, (hp[0] || 0) / maxHp * 100))}%`;
          p2hp.style.width = `${Math.max(0, Math.min(100, (hp[1] || 0) / maxHp * 100))}%`;
          p1text.textContent = hp[0] ?? 0;
          p2text.textContent = hp[1] ?? 0;
        } catch {
          dot.classList.remove("online");
          camera.textContent = "camera: offline";
        }
      }

      reset.addEventListener("click", async () => {
        await fetch("/reset", { method: "POST" });
        await refreshStatus();
      });

      refreshStatus();
      setInterval(refreshStatus, 1000);
    </script>
  </body>
</html>
